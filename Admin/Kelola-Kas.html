<!DOCTYPE html>
<html lang="id">
<head>
    <script>
        if (localStorage.getItem('theme') === 'light') {
            document.documentElement.classList.add('light-mode');
        }
    </script>
    <link class="head-theme-sync" rel="icon" href="../bendahara.png" type="image/png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kelola Kas — Admin Center</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            /* ==========================================================================
               DARK MODE (DEFAULT) SYSTEM - Modern Deep Slate & Obsidian
               ========================================================================== */
            --bg-main: #07090e;              /* Deep elegant obsidian background */
            --bg-card: #0e111a;              /* Crisp card background with high contrast */
            --border-card: #1d2235;          /* Sophisticated border */
            --border-muted: #141724;         /* Subtler border */
            
            --text-primary: #f8fafc;         /* Slate 50 */
            --text-sec-100: #f1f5f9;         /* Slate 100 */
            --text-sec-200: #e2e8f0;         /* Slate 200 */
            --text-sec-300: #cbd5e1;         /* Slate 300 */
            --text-sec-400: #94a3b8;         /* Slate 400 */
            --text-sec-500: #64748b;         /* Slate 500 */
            --text-sec-600: #475569;         /* Slate 600 */
            
            --bg-neutral-pill: #151a29;      /* Background for neutral pills */
            
            --bg-cyan-pill: rgba(6, 182, 212, 0.08);
            --border-cyan-pill: rgba(6, 182, 212, 0.20);
            --text-cyan-accent: #22d3ee;     /* Cyan 400 */
            
            --bg-green-pill: rgba(34, 197, 94, 0.08);
            --border-green-pill: rgba(34, 197, 94, 0.20);
            --text-green-accent: #4ade80;    /* Green 400 */
            
            --bg-amber-pill: rgba(245, 158, 11, 0.08);
            --border-amber-pill: rgba(245, 158, 11, 0.20);
            --text-amber-accent: #fbbf24;    /* Amber 400 */
            
            --text-rose-accent: #fb7185;     /* Rose 400 */
            
            --splash-bg: #07090e;
            --splash-text: #ffffff;
            --splash-glow: rgba(16, 185, 129, 0.08);
            
            --footer-bg: rgba(14, 17, 26, 0.4);
            --footer-border: #141724;
            
            --hover-cyan-border: rgba(6, 182, 212, 0.4);
            --hover-green-border: rgba(34, 197, 94, 0.4);
            --hover-amber-border: rgba(245, 158, 11, 0.4);
            --hover-neutral-border: #334155;

            /* Accent glow variables */
            --glow-cyan: 0 4px 20px rgba(6, 182, 212, 0.15);
            --glow-green: 0 4px 20px rgba(34, 197, 94, 0.15);
            --shadow-card: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
        }
        
        html.light-mode {
            /* ==========================================================================
               LIGHT MODE SYSTEM - Comfort Sage Green & Mint White (Low Glare)
               ========================================================================== */
            --bg-main: #f0f5f2;              /* Soft soothing sage green-white */
            --bg-card: #ffffff;              /* Crisp white cards for depth */
            --border-card: #ccd9d2;          /* Soft sage borders */
            --border-muted: #e2ece7;         /* Subtler mint/sage borders */
            
            --text-primary: #0a140f;         /* Midnight spruce pine green for maximum contrast */
            --text-sec-100: #0a140f;
            --text-sec-200: #12241b;
            --text-sec-300: #1c3327;
            --text-sec-400: #284233;         /* Sage secondary (darker for readability) */
            --text-sec-500: #3b5c49;         /* Sage muted (darker) */
            --text-sec-600: #547862;         /* Sage lightest (darker) */
            
            --bg-neutral-pill: #e2ece7;      /* Soft mint-sage pills */
            
            --bg-cyan-pill: rgba(8, 145, 178, 0.06);
            --border-cyan-pill: rgba(8, 145, 178, 0.18);
            --text-cyan-accent: #0891b2;     /* Softer cyan for readability */
            
            --bg-green-pill: rgba(21, 128, 61, 0.06);
            --border-green-pill: rgba(21, 128, 61, 0.18);
            --text-green-accent: #15803d;    /* Rich green */
            
            --bg-amber-pill: rgba(180, 83, 9, 0.06);
            --border-amber-pill: rgba(180, 83, 9, 0.18);
            --text-amber-accent: #b45309;    /* Gold/Amber */
            
            --text-rose-accent: #be123c;     /* Deep ruby */
            
            --splash-bg: #f0f5f2;
            --splash-text: #0a140f;
            --splash-glow: rgba(21, 128, 61, 0.05);
            
            --footer-bg: rgba(226, 236, 231, 0.4);
            --footer-border: #ccd9d2;
            
            --hover-cyan-border: rgba(8, 145, 178, 0.4);
            --hover-green-border: rgba(21, 128, 61, 0.4);
            --hover-amber-border: rgba(180, 83, 9, 0.4);
            --hover-neutral-border: #b0c3b7;

            /* Shadow & glow adjustments */
            --glow-cyan: 0 4px 15px rgba(8, 145, 178, 0.08);
            --glow-green: 0 4px 15px rgba(21, 128, 61, 0.08);
            --shadow-card: 0 10px 30px -10px rgba(13, 32, 21, 0.05);
        }

        /* Font volume/weight overrides in Light Mode to prevent irradiation blur and thin letters */
        html.light-mode, html.light-mode body {
            font-weight: 500 !important;
        }
        html.light-mode .font-light,
        html.light-mode .font-normal {
            font-weight: 500 !important;
        }
        html.light-mode .font-medium {
            font-weight: 600 !important;
        }
        html.light-mode .font-semibold {
            font-weight: 700 !important;
        }
        html.light-mode .font-bold {
            font-weight: 800 !important;
        }
        html.light-mode input::placeholder {
            color: var(--text-sec-500) !important;
            opacity: 1 !important;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--bg-main) !important; 
            color: var(--text-primary) !important; 
            transition: background-color 0.4s cubic-bezier(0.4, 0, 0.2, 1), color 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Apply variables to Tailwind class instances recursively */
        .bg-neutral-950 { 
            background-color: var(--bg-card) !important; 
            box-shadow: var(--shadow-card);
            transition: background-color 0.4s ease, box-shadow 0.4s ease, border-color 0.4s ease; 
        }
        
        .border-neutral-900 { 
            border-color: var(--border-card) !important; 
            transition: border-color 0.4s ease; 
        }
        
        .border-neutral-800 { 
            border-color: var(--border-muted) !important; 
            transition: border-color 0.4s ease; 
        }
        
        .text-white { 
            color: var(--text-primary) !important; 
            transition: color 0.4s ease; 
        }
        
        .text-neutral-100 { 
            color: var(--text-sec-100) !important; 
            transition: color 0.4s ease; 
        }
        
        .text-neutral-200 { 
            color: var(--text-sec-200) !important; 
            transition: color 0.4s ease; 
        }
        
        .text-neutral-300 { 
            color: var(--text-sec-300) !important; 
            transition: color 0.4s ease; 
        }
        
        .text-neutral-400 { 
            color: var(--text-sec-400) !important; 
            transition: color 0.4s ease; 
        }
        
        .text-neutral-500 { 
            color: var(--text-sec-500) !important; 
            transition: color 0.4s ease; 
        }

        .text-neutral-600 {
            color: var(--text-sec-600) !important;
            transition: color 0.4s ease;
        }
        
        .bg-neutral-900 { 
            background-color: var(--bg-neutral-pill) !important; 
            transition: background-color 0.4s ease; 
        }
        
        /* Cyan indicators & pills */
        .bg-cyan-950\/40 { 
            background-color: var(--bg-cyan-pill) !important; 
            transition: background-color 0.4s ease; 
        }
        .border-cyan-500\/20 { 
            border-color: var(--border-cyan-pill) !important; 
            transition: border-color 0.4s ease; 
        }
        .text-cyan-400 { 
            color: var(--text-cyan-accent) !important; 
            transition: color 0.4s ease; 
        }
        .border-t-cyan-400 {
            border-top-color: var(--text-cyan-accent) !important;
            box-shadow: var(--glow-cyan);
            transition: border-top-color 0.4s ease, box-shadow 0.4s ease;
        }
        
        /* Green indicators & pills */
        .bg-green-950\/40 { 
            background-color: var(--bg-green-pill) !important; 
            transition: background-color 0.4s ease; 
        }
        .border-green-500\/20 { 
            border-color: var(--border-green-pill) !important; 
            transition: border-color 0.4s ease; 
        }
        .text-green-400 { 
            color: var(--text-green-accent) !important; 
            transition: color 0.4s ease; 
        }
        .text-emerald-400 { 
            color: var(--text-green-accent) !important; 
            transition: color 0.4s ease; 
        }
        .border-t-green-400 {
            border-top-color: var(--text-green-accent) !important;
            box-shadow: var(--glow-green);
            transition: border-top-color 0.4s ease, box-shadow 0.4s ease;
        }
        .bg-green-400 {
            background-color: var(--text-green-accent) !important;
            transition: background-color 0.4s ease;
        }
        
        /* Amber indicators & pills */
        .bg-amber-950\/40 { 
            background-color: var(--bg-amber-pill) !important; 
            transition: background-color 0.4s ease; 
        }
        .border-amber-500\/20 { 
            border-color: var(--border-amber-pill) !important; 
            transition: border-color 0.4s ease; 
        }
        
        /* Rose indicators */
        .text-rose-400 { 
            color: var(--text-rose-accent) !important; 
            transition: color 0.4s ease; 
        }
        
        footer { 
            border-color: var(--footer-border) !important; 
            background-color: var(--footer-bg) !important; 
            transition: background-color 0.4s ease, border-color 0.4s ease; 
        }
        
        /* Hover Effects */
        .hover\:border-cyan-500\/30:hover { 
            border-color: var(--hover-cyan-border) !important; 
        }
        .hover\:border-green-500\/30:hover { 
            border-color: var(--hover-green-border) !important; 
        }
        .hover\:border-amber-500\/30:hover { 
            border-color: var(--hover-amber-border) !important; 
        }
        .hover\:border-neutral-700:hover { 
            border-color: var(--hover-neutral-border) !important; 
        }
        
        /* Selection Override */
        body::selection, body *::selection {
            background-color: var(--bg-cyan-pill) !important;
            color: var(--text-cyan-accent) !important;
        }
        
        /* SweetAlert2 Dynamic Styling */
        .swal2-popup { 
            background: var(--bg-card) !important; 
            border: 1px solid var(--border-card) !important; 
            border-radius: 1rem !important; 
            color: var(--text-primary) !important; 
            transition: background-color 0.4s ease, border-color 0.4s ease, color 0.4s ease;
        }
        .swal2-title { 
            color: var(--text-primary) !important; 
            font-size: 14px !important; 
            font-family: 'Plus Jakarta Sans', sans-serif !important; 
            font-weight: bold !important; 
        }
        .swal2-html-container { 
            color: var(--text-sec-400) !important; 
            font-size: 11px !important; 
            font-family: 'Plus Jakarta Sans', sans-serif !important; 
        }
        .swal2-confirm { 
            background-color: var(--text-cyan-accent) !important; 
            color: var(--bg-main) !important; 
            font-size: 11px !important; 
            font-weight: bold !important; 
            border-radius: 0.5rem !important; 
            transition: background-color 0.4s ease, color 0.4s ease;
        }
        .swal2-cancel { 
            background-color: var(--bg-neutral-pill) !important; 
            color: var(--text-sec-400) !important; 
            font-size: 11px !important; 
            border-radius: 0.5rem !important; 
            transition: background-color 0.4s ease, color 0.4s ease;
        }
        
        /* Premium Loading Overlay */
        #loading-overlay {
            background-color: var(--bg-main) !important;
            opacity: 1;
            transition: opacity 0.4s ease, visibility 0.4s ease;
        }
        #loading-overlay.fade-out {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }
        .spinner-ring {
            border-color: var(--border-muted) !important;
            border-top-color: var(--text-green-accent) !important;
            box-shadow: var(--glow-green);
        }
        @keyframes float-masjid {
            0%, 100% { transform: translateY(2px) scale(1); }
            50% { transform: translateY(-1px) scale(1.03); }
        }
        @keyframes drift-cloud-1 {
            0%, 100% { transform: translate(-20px, -12px); opacity: 0.3; }
            50% { transform: translate(-14px, -12px); opacity: 0.6; }
        }
        @keyframes drift-cloud-2 {
            0%, 100% { transform: translate(20px, -14px); opacity: 0.25; }
            50% { transform: translate(14px, -14px); opacity: 0.55; }
        }
        @keyframes pulse-sun {
            0%, 100% { transform: translate(-15px, -22px) scale(0.95); opacity: 0.4; filter: drop-shadow(0 0 4px rgba(245, 158, 11, 0.3)); }
            50% { transform: translate(-12px, -20px) scale(1.1); opacity: 0.8; filter: drop-shadow(0 0 10px rgba(245, 158, 11, 0.6)); }
        }
        .animate-float-masjid {
            animation: float-masjid 3s infinite ease-in-out;
        }
        .animate-drift-cloud-1 {
            animation: drift-cloud-1 6s infinite ease-in-out;
        }
        .animate-drift-cloud-2 {
            animation: drift-cloud-2 8s infinite ease-in-out;
        }
        .animate-pulse-sun {
            animation: pulse-sun 4s infinite ease-in-out;
        }

        /* High-contrast green text/badge overrides for Light Mode */
        html.light-mode .text-emerald-400,
        html.light-mode .text-emerald-500,
        html.light-mode .text-green-400,
        html.light-mode .text-green-500 {
            color: #15803d !important;
        }
        html.light-mode .bg-emerald-950\/40,
        html.light-mode .bg-emerald-950\/20,
        html.light-mode .bg-emerald-950,
        html.light-mode .bg-green-950\/40,
        html.light-mode .bg-green-950\/20,
        html.light-mode .bg-green-950 {
            background-color: rgba(21, 128, 61, 0.08) !important;
        }
        html.light-mode .border-emerald-800\/40,
        html.light-mode .border-emerald-900\/30,
        html.light-mode .border-emerald-500\/20,
        html.light-mode .border-emerald-500\/30,
        html.light-mode .border-green-500\/20,
        html.light-mode .border-green-500\/30 {
            border-color: rgba(21, 128, 61, 0.25) !important;
        }
        html.light-mode .border-l-emerald-500 {
            border-left-color: #15803d !important;
        }
        html.light-mode .border-t-emerald-500 {
            border-top-color: #15803d !important;
        }
    </style>
</head>
<body class="min-h-screen antialiased flex flex-col justify-between selection:bg-cyan-950 selection:text-cyan-400">

    <!-- PREMIUM LOADING OVERLAY -->
    <div id="loading-overlay" class="fixed inset-0 z-[9999] flex flex-col items-center justify-center transition-all duration-300">
        <div class="relative flex flex-col items-center justify-center">
            <!-- Spinner Ring Outer -->
            <div class="w-20 h-20 rounded-full border-4 spinner-ring animate-spin"></div>
            
            <!-- Floating Elements Inside -->
            <div class="absolute w-20 h-20 flex items-center justify-center overflow-hidden">
                <!-- Glowing Sun in background (Top-Left above Masjid) -->
                <div class="absolute text-amber-400 text-xs animate-pulse-sun" style="transform: translate(-15px, -22px);">☀️</div>
                <!-- Drifting Cloud 1 (Left side above Masjid) -->
                <div class="absolute text-neutral-400 text-[9px] animate-drift-cloud-1" style="transform: translate(-20px, -12px);">☁️</div>
                <!-- Drifting Cloud 2 (Right side above Masjid) -->
                <div class="absolute text-neutral-500 text-[7px] animate-drift-cloud-2" style="transform: translate(20px, -14px);">☁️</div>
                <!-- Floating Masjid in Center-Bottom -->
                <div class="absolute text-2xl animate-float-masjid" style="transform: translateY(2px);">🕌</div>
            </div>
            
            <span class="mt-4 text-[10px] font-mono tracking-widest text-neutral-400 uppercase font-black">MEMUAT DATABASE...</span>
        </div>
    </div>

    <header class="border-b border-neutral-900 bg-neutral-950/40 backdrop-blur-md sticky top-0 z-50 h-14 flex items-center justify-center">
        <div class="max-w-4xl w-full mx-auto px-4 sm:px-6 flex items-center justify-between">
            <a href="Admin-Dashboard.html" class="flex items-center gap-1.5 px-3 py-1.5 rounded-xl bg-neutral-900 border border-neutral-800 hover:border-neutral-700 text-[10px] font-mono text-neutral-400 hover:text-cyan-400 transition-all duration-300 active:scale-95 font-bold shadow-inner font-bold">
                <span>←</span> <span>Dashboard</span>
            </a>
            <div class="flex items-center gap-3">
                <span class="text-xs font-mono tracking-wider text-neutral-400 uppercase font-bold text-cyan-400 hidden sm:inline">
                    KAS ADMIN CENTER
                </span>
                <button id="themeToggleBtn" onclick="toggleTheme(event)" class="w-9 h-9 rounded-full bg-neutral-950 border border-neutral-800 flex items-center justify-center text-sm shadow-inner hover:border-neutral-700 active:scale-95 transition-all text-neutral-300 cursor-pointer" title="Ubah Tema">
                    🌙
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-4 sm:px-6 py-5 w-full flex-grow flex flex-col gap-4">
        
        <div class="bg-neutral-950 border border-neutral-900 p-3 rounded-xl flex flex-col gap-2.5">
            <span class="text-[9px] font-mono tracking-widest text-neutral-500 uppercase font-bold block">CARI NAMA</span>
            <div class="relative">
                <input type="text" id="searchInput" onkeyup="filterPengurus()" placeholder="Ketik nama pengurus untuk input atau hapus iuran bulan..." class="w-full bg-neutral-900 border border-neutral-800 rounded-lg pl-9 pr-4 py-2 text-xs text-neutral-200 focus:outline-none focus:border-cyan-500 font-sans">
                <div class="absolute left-3 top-2.5 text-neutral-600 text-xs">🔍</div>
            </div>
        </div>

        <div class="flex flex-col gap-3">
            <div class="flex justify-between items-center bg-neutral-950 border border-neutral-900 p-3 rounded-xl">
                <span class="text-[10px] font-mono tracking-widest text-neutral-400 uppercase font-black block">INPUT & MONITORING KAS</span>
                <span class="text-[9px] bg-neutral-900 border border-neutral-800 text-neutral-400 font-mono px-2 py-1 rounded">
                    Periode: <span class="text-cyan-400 font-bold">2026</span>
                </span>
            </div>

            <div class="flex flex-col gap-2.5" id="pengurusListContainer">
                <!-- Data pengurus akan dimuat secara dinamis dari database -->
            </div>
        </div>
    </main>

    <div id="modalInputKasAdmin" class="hidden fixed inset-0 z-50 bg-black/80 backdrop-blur-xs flex items-center justify-center p-4">
        <div class="bg-neutral-950 border border-neutral-900 w-full max-w-sm rounded-xl p-5 flex flex-col gap-4">
            <div class="flex items-center justify-between border-b border-neutral-900 pb-2.5">
                <div class="flex flex-col">
                    <span class="text-[9px] font-mono tracking-widest text-cyan-400 uppercase font-black">Input Kas</span>
                    <h3 id="modalTargetName" class="text-sm font-bold text-white font-sans mt-0.5">Nama Pengurus</h3>
                </div>
                <button type="button" onclick="tutupModalInputKas()" class="text-neutral-500 hover:text-white text-xs font-mono cursor-pointer">✕</button>
            </div>

            <form id="formInputKasAjax" onsubmit="simpanKasRealTime(event)" class="flex flex-col gap-3.5">
                <input type="hidden" id="modalUserId">

                <div>
                    <label class="text-[9px] font-mono uppercase text-neutral-500 block mb-1 font-bold">1. Centang Bulan Tagihan</label>
                    <div id="modalMonthsGrid" class="grid grid-cols-4 gap-1.5 p-2 bg-neutral-900 border border-neutral-800 rounded-xl font-mono text-[10px] max-h-24 overflow-y-auto no-scrollbar">
                    </div>
                </div>

                <div>
                    <label class="text-[9px] font-mono uppercase text-neutral-500 block mb-1 font-bold">2. Metode Penerimaan</label>
                    <select id="modalMetode" name="metode" required class="w-full bg-neutral-900 border border-neutral-800 rounded-xl px-3 py-2 text-xs text-neutral-200 focus:outline-none focus:border-cyan-500 font-mono">
                        <option value="Tunai">Cash / Tunai Fisik</option>
                        <option value="GoPay">QRIS / E-Wallet GoPay</option>
                    </select>
                </div>

                <div>
                    <label class="text-[9px] font-mono uppercase text-neutral-500 block mb-1 font-bold">3. Bukti Transaksi (Opsional)</label>
                    <input type="file" id="modal_bukti_file" accept="image/*" class="w-full text-xs text-neutral-400 bg-neutral-900 border border-neutral-800 rounded-xl px-3 py-2 focus:outline-none focus:border-cyan-500 file:mr-3 file:py-1 file:px-2.5 file:rounded file:border-0 file:text-[10px] file:font-mono file:bg-neutral-800 file:text-cyan-400 file:cursor-pointer hover:file:bg-cyan-950/40">
                    <!-- Image preview container -->
                    <div id="modal_preview_container" class="hidden mt-2 relative p-2 bg-neutral-900 border border-neutral-850 rounded-xl flex items-center justify-between">
                        <div class="flex items-center gap-2 overflow-hidden">
                            <img id="modal_image_preview" src="" class="w-12 h-12 rounded object-cover border border-neutral-800">
                            <span id="modal_image_reduction_info" class="text-[9px] font-mono text-neutral-500"></span>
                        </div>
                        <button type="button" onclick="resetModalImage()" class="text-[9px] font-mono text-red-400 hover:text-red-300 bg-neutral-950 border border-neutral-800 px-2 py-1 rounded cursor-pointer transition-all">Hapus</button>
                    </div>
                </div>

                <div class="bg-cyan-950/20 p-3 rounded-xl text-center flex flex-col gap-0.5 border border-cyan-900/30">
                    <span class="text-[9px] font-mono text-cyan-400 uppercase font-bold tracking-wider">TOTAL SALDO TERIMA</span>
                    <div id="modalTotalText" class="text-xl font-black text-white font-mono tracking-tight">Rp 0</div>
                </div>

                <div class="grid grid-cols-2 gap-2 pt-1 font-mono text-xs">
                    <button type="button" onclick="tutupModalInputKas()" class="bg-neutral-900 hover:bg-neutral-800 border border-neutral-800 text-neutral-400 py-2 rounded-xl font-bold cursor-pointer">
                        BATAL
                    </button>
                    <button type="submit" class="bg-cyan-500 hover:bg-cyan-600 text-neutral-950 py-2 rounded-xl font-black tracking-wide shadow-md cursor-pointer">
                        SIMPAN ✓
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- MODAL PREVIEW BUKTI DRIVE/BASE64 -->
    <div id="receipt-modal" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-neutral-950/80 backdrop-blur-md hidden opacity-0 transition-opacity duration-300 pointer-events-none">
        <div class="relative bg-neutral-900 border border-neutral-800 max-w-lg w-full rounded-2xl overflow-hidden shadow-2xl transform scale-95 transition-transform duration-300 flex flex-col max-h-[85vh]">
            <div class="flex items-center justify-between border-b border-neutral-800 p-4">
                <span class="text-xs font-mono font-bold tracking-wider text-cyan-400 uppercase">Lampiran Bukti Resmi</span>
                <button onclick="closeReceiptModal()" class="w-6 h-6 rounded-lg bg-neutral-950 border border-neutral-800 text-xs font-mono text-neutral-500 hover:text-white hover:border-neutral-600 transition-all cursor-pointer">✕</button>
            </div>
            <div class="p-4 flex-grow flex items-center justify-center overflow-auto bg-neutral-950/40">
                <img id="receipt-img-preview" src="" alt="Bukti Pembayaran" class="max-w-full max-h-[50vh] object-contain rounded-lg border border-neutral-900/60 shadow-lg">
            </div>
            <div class="border-t border-neutral-800 p-3 text-center bg-neutral-950/20">
                <a id="receipt-download-link" href="#" download class="text-[10px] font-mono text-neutral-400 hover:text-cyan-400 transition-colors py-1.5 px-3 border border-neutral-800 hover:border-cyan-500/20 rounded-lg inline-block bg-neutral-900/60" target="_blank">
                    Unduh/Buka File Lampiran ↗
                </a>
            </div>
        </div>
    </div>

    <footer class="border-t border-neutral-900 bg-neutral-950/40 py-4 text-center">
        <span class="text-[9px] font-mono text-neutral-600 tracking-wider uppercase font-bold">LDK IMIP (Ikatan Mahasiswa Islam Polimedia)</span>
    </footer>

    <script>
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzc4KjFANk2dGnw18Vw07aXlJ8BLJ1-VrAPQ2Oj35v0LnmLennIA19Z5eJIyLl4N1ad/exec";
        
        function hideLoadingOverlay() {
            const overlay = document.getElementById('loading-overlay');
            if (overlay) {
                overlay.classList.add('fade-out');
                setTimeout(() => overlay.remove(), 400);
            }
        }
        
        let databaseMembers = [];
        let databaseKas = [];
        let databaseTransactions = [];
        let localTrackingCache = {};
        let kasImageBase64 = '';

        function getReceiptPath(tx) {
            if (tx.bukti && tx.bukti.trim()) {
                const b = tx.bukti.trim();
                if (b.startsWith('http://') || b.startsWith('https://') || b.startsWith('data:image/')) {
                    return b;
                }
            }
            if (!tx.catatan) return null;
            const c = tx.catatan.trim();
            if (c.startsWith('http://') || c.startsWith('https://') || c.startsWith('data:image/')) {
                return c;
            }
            const urlMatch = c.match(/https?:\/\/[^\s)]+/);
            if (urlMatch) return urlMatch[0];
            
            const base64Match = c.match(/data:image\/[^\s)]+/);
            if (base64Match) return base64Match[0];
            
            return null;
        }

        window.openReceiptModal = function(src) {
            const modal = document.getElementById('receipt-modal');
            const img = document.getElementById('receipt-img-preview');
            const link = document.getElementById('receipt-download-link');
            
            let placeholder = document.getElementById('drive-receipt-placeholder');
            const isDrive = src.includes('drive.google.com');
            
            if (isDrive) {
                img.classList.add('hidden');
                link.innerText = "Buka Lampiran di Google Drive ↗";
                link.classList.remove('hover:text-emerald-400', 'hover:border-emerald-500/20');
                link.classList.add('hover:text-cyan-400', 'hover:border-cyan-500/20');
                
                if (!placeholder) {
                    placeholder = document.createElement('div');
                    placeholder.id = 'drive-receipt-placeholder';
                    placeholder.className = 'text-center py-8 px-4 flex flex-col items-center justify-center gap-3';
                    placeholder.innerHTML = `
                        <div class="w-16 h-16 rounded-full bg-neutral-900 border border-neutral-800 flex items-center justify-center text-cyan-400">
                            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                            </svg>
                        </div>
                        <p class="text-xs text-neutral-400 max-w-xs leading-relaxed font-sans">
                            File bukti pembayaran disimpan di Google Drive Anda. Klik tombol di bawah untuk membukanya secara aman di Google Drive.
                        </p>
                    `;
                    img.parentNode.appendChild(placeholder);
                } else {
                    placeholder.classList.remove('hidden');
                }
            } else {
                img.classList.remove('hidden');
                img.src = src;
                link.innerText = "Unduh/Buka File Lampiran ↗";
                link.classList.remove('hover:text-cyan-400', 'hover:border-cyan-500/20');
                link.classList.add('hover:text-emerald-400', 'hover:border-emerald-500/20');
                if (placeholder) {
                    placeholder.classList.add('hidden');
                }
            }
            
            link.href = src;
            
            modal.classList.remove('hidden');
            modal.classList.remove('pointer-events-none');
            modal.classList.add('pointer-events-auto');
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                modal.classList.add('opacity-100');
                modal.querySelector('.transform').classList.remove('scale-95');
                modal.querySelector('.transform').classList.add('scale-100');
            }, 10);
        };

        window.closeReceiptModal = function() {
            const modal = document.getElementById('receipt-modal');
            modal.classList.remove('opacity-100');
            modal.classList.add('opacity-0');
            modal.querySelector('.transform').classList.remove('scale-100');
            modal.querySelector('.transform').classList.add('scale-95');
            setTimeout(() => {
                modal.classList.add('hidden');
                modal.classList.remove('pointer-events-auto');
                modal.classList.add('pointer-events-none');
            }, 300);
        };

        // Close modal when clicking on backdrop
        document.addEventListener('DOMContentLoaded', () => {
            const modal = document.getElementById('receipt-modal');
            if (modal) {
                modal.addEventListener('click', (e) => {
                    if (e.target === modal) {
                        closeReceiptModal();
                    }
                });
            }

            const modalFileInput = document.getElementById('modal_bukti_file');
            if (modalFileInput) {
                modalFileInput.addEventListener('change', function(e) {
                    const file = e.target.files[0];
                    if (!file) return;

                    const container = document.getElementById('modal_preview_container');
                    const preview = document.getElementById('modal_image_preview');
                    const info = document.getElementById('modal_image_reduction_info');

                    container.classList.remove('hidden');

                    const reader = new FileReader();
                    reader.onload = function(event) {
                        const img = new Image();
                        img.onload = function() {
                            const canvas = document.createElement('canvas');
                            canvas.width = img.width > 800 ? 800 : img.width;
                            canvas.height = img.width > 800 ? (img.height * (800 / img.width)) : img.height;
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

                            canvas.toBlob(function(blob) {
                                preview.src = URL.createObjectURL(blob);
                                info.innerText = `${(file.size / 1024).toFixed(1)} KB ➔ ${(blob.size / 1024).toFixed(1)} KB`;
                                kasImageBase64 = canvas.toDataURL('image/jpeg', 0.7);
                            }, 'image/jpeg', 0.7);
                        };
                        img.src = event.target.result;
                    };
                    reader.readAsDataURL(file);
                });
            }
        });

        window.resetModalImage = function() {
            kasImageBase64 = '';
            const fileInput = document.getElementById('modal_bukti_file');
            if (fileInput) fileInput.value = '';
            const container = document.getElementById('modal_preview_container');
            if (container) container.classList.add('hidden');
            const preview = document.getElementById('modal_image_preview');
            if (preview) preview.src = '';
            const info = document.getElementById('modal_image_reduction_info');
            if (info) info.innerText = '';
        }

        function fetchInitialData(forceRefresh = false) {
            if (!GOOGLE_SCRIPT_URL) {
                console.warn("GOOGLE_SCRIPT_URL belum diset!");
                hideLoadingOverlay();
                return;
            }

            const CACHE_KEY = "ldk_db_cache";
            const CACHE_TIME_KEY = "ldk_db_cache_time";
            const CACHE_TTL = 15000; // 15 seconds cache

            if (forceRefresh) {
                sessionStorage.removeItem(CACHE_KEY);
                sessionStorage.removeItem(CACHE_TIME_KEY);
            }

            const cachedData = sessionStorage.getItem(CACHE_KEY);
            const cachedTime = sessionStorage.getItem(CACHE_TIME_KEY);
            const now = Date.now();
            let hasRenderedFromCache = false;

            if (cachedData && cachedTime) {
                try {
                    const data = JSON.parse(cachedData);
                    if (data && data.status === "success") {
                        databaseMembers = data.anggota || [];
                        databaseKas = data.kas || [];
                        databaseTransactions = data.transaksi || [];
                        renderPengurusList(databaseMembers, databaseKas);
                        hideLoadingOverlay();
                        hasRenderedFromCache = true;

                        if (now - Number(cachedTime) < CACHE_TTL && !forceRefresh) {
                            console.log("Using fresh cache for Kelola-Kas");
                            return;
                        }
                        console.log("Using stale cache, fetching fresh data in background...");
                    }
                } catch (e) {
                    console.error("Cache load error:", e);
                }
            }
            
            const container = document.getElementById('pengurusListContainer');
            // Menampilkan loading inline jika overlay dilewati
            if (!hasRenderedFromCache && container && container.children.length === 0) {
                container.innerHTML = `
                    <div class="py-12 bg-neutral-950 border border-neutral-900 border-dashed rounded-xl text-center text-neutral-500 text-xs italic font-sans flex flex-col items-center justify-center gap-2">
                        <div class="w-5 h-5 border-2 border-cyan-500 border-t-transparent rounded-full animate-spin"></div>
                        <span>Memuat data pengurus dari Google Sheets...</span>
                    </div>
                `;
            }

            fetch(GOOGLE_SCRIPT_URL + "?action=get_all_data")
                .then(response => response.json())
                .then(res => {
                    if (res.status === "success") {
                        sessionStorage.setItem(CACHE_KEY, JSON.stringify(res));
                        sessionStorage.setItem(CACHE_TIME_KEY, now.toString());

                        databaseMembers = res.anggota || [];
                        databaseKas = res.kas || [];
                        databaseTransactions = res.transaksi || [];
                        renderPengurusList(databaseMembers, databaseKas);
                    } else {
                        console.error("Gagal memuat data:", res.message);
                        if (!hasRenderedFromCache && container) {
                            container.innerHTML = `<div class="py-6 text-center text-xs text-red-500 font-mono">Gagal memuat data database! (${res.message})</div>`;
                        }
                    }
                })
                .catch(err => {
                    console.error("Fetch Error:", err);
                    if (!hasRenderedFromCache && container) {
                        container.innerHTML = `<div class="py-6 text-center text-xs text-red-500 font-mono">Koneksi database terputus / gagal!</div>`;
                    }
                })
                .finally(() => {
                    hideLoadingOverlay();
                });
        }

        function renderPengurusList(members, kas) {
            const container = document.getElementById('pengurusListContainer');
            container.innerHTML = '';
            
            // Filter only active members for kas list
            const activeMembers = members.filter(m => m.is_active !== false);
            
            if (activeMembers.length === 0) {
                container.innerHTML = `<div class="py-6 text-center text-xs text-neutral-500 font-mono">Belum ada data anggota aktif di sheet 'anggota'.</div>`;
                return;
            }

            localTrackingCache = {}; // Reset cache

            activeMembers.forEach((member, index) => {
                const userPayments = kas.filter(k => k.user_id.toString() === member.id.toString());
                const monthsPaidCount = userPayments.length;
                
                const months = ['Jan', 'Feb', 'Mar', 'Apr', 'Mei', 'Jun', 'Jul', 'Ags', 'Sep', 'Okt', 'Nov', 'Des'];
                const tracking = { id: member.id, name: member.name, divisi: member.divisi };
                
                months.forEach(m => {
                    tracking[m] = userPayments.some(k => k.bulan === m);
                });
                
                localTrackingCache[member.id] = tracking;

                const cardHtml = `
                    <div class="pengurus-card bg-neutral-950 border border-neutral-900 rounded-xl overflow-hidden shadow-xs" data-name="${member.name.toLowerCase()}">
                        <div class="w-full p-3.5 flex items-center justify-between text-left">
                            <div onclick="toggleAccordion(${index})" class="overflow-hidden pr-2 flex-grow cursor-pointer">
                                <h4 class="text-xs font-bold text-neutral-200 truncate">${member.name}</h4>
                                <span class="text-[9px] text-neutral-500 block truncate mt-0.5">${member.divisi} — ${member.jabatan || 'Anggota'}</span>
                            </div>
                            <div class="text-right shrink-0 flex items-center gap-3">
                                <span onclick="toggleAccordion(${index})" id="badge-count-${member.id}" data-total="${monthsPaidCount}" class="text-[9px] font-mono px-2 py-0.5 rounded-md font-bold bg-neutral-900 ${monthsPaidCount === 12 ? 'text-emerald-400 border border-emerald-900/50' : 'text-cyan-400 border border-neutral-800'} cursor-pointer">
                                    ${monthsPaidCount}/12 Bln
                                </span>
                                <button data-id="${member.id}" data-name="${member.name}" data-tracking='${JSON.stringify(tracking)}' onclick="bukaModalInputKas(this)" class="bg-cyan-500 hover:bg-cyan-600 text-neutral-950 text-[10px] font-bold px-3 py-1.5 rounded-lg font-mono transition-transform active:scale-95 cursor-pointer">
                                    BAYAR
                                </button>
                                <span onclick="toggleAccordion(${index})" id="arrow-${index}" class="text-[10px] text-neutral-600 transition-transform duration-200 cursor-pointer">▼</span>
                            </div>
                        </div>
                        <div id="content-${index}" class="hidden border-t border-neutral-900/60 bg-neutral-900/10 p-3">
                            <div class="grid grid-cols-4 sm:grid-cols-6 md:grid-cols-12 gap-1.5 text-center">
                                ${months.map(m => {
                                    const kasRow = userPayments.find(k => k.bulan === m);
                                    if (kasRow) {
                                        const txId = kasRow.transaksi_id ? kasRow.transaksi_id.toString() : "";
                                        const txObj = txId ? databaseTransactions.find(t => t.id.toString() === txId) : null;
                                        const receiptPath = txObj ? getReceiptPath(txObj) : null;
                                        return `
                                            <div id="box-${member.id}-${m}" class="p-2 rounded-lg border bg-cyan-950/40 border-cyan-500/20 text-cyan-400 text-[10px] font-mono font-bold flex flex-col justify-center items-center relative min-h-[56px] py-1.5">
                                                 <span>${m}</span>
                                                 <span class="text-[7px] text-cyan-500/80 font-sans block mt-0.5">LUNAS</span>
                                                 ${txId ? `<span class="text-[6px] text-cyan-600/70 font-mono font-light select-all mt-0.5">${txId}</span>` : ''}
                                                 ${receiptPath ? `
                                                     <button type="button" onclick="openReceiptModal('${receiptPath}')" class="mt-1 text-[8px] px-1 py-0.5 bg-cyan-900/60 hover:bg-cyan-800 border border-cyan-500/30 rounded text-cyan-300 transition-all cursor-pointer">
                                                         📂 Bukti
                                                     </button>
                                                 ` : ''}
                                                 <button type="button" data-txid="${kasRow.transaksi_id}" data-userid="${member.id}" data-bulan="${m}" data-name="${member.name}" onclick="hapusKasRealTime(this)" class="absolute -top-1 -right-1 w-4 h-4 bg-red-600 hover:bg-red-700 text-white rounded-full flex items-center justify-center text-[8px] font-black shadow-md transition-transform active:scale-95 cursor-pointer">
                                                     ✕
                                                 </button>
                                             </div>
                                        `;
                                    } else {
                                        return `
                                            <div id="box-${member.id}-${m}" class="p-2 rounded-lg border bg-neutral-950 border-neutral-900 text-neutral-700 text-[10px] font-mono font-bold flex flex-col justify-center items-center min-h-14">
                                                <span>${m}</span>
                                                <span class="text-[7px] text-neutral-800 font-sans block mt-0.5">BELUM</span>
                                            </div>
                                        `;
                                    }
                                }).join('')}
                            </div>
                        </div>
                    </div>
                `;
                container.innerHTML += cardHtml;
            });
        }

        function filterPengurus() {
            const input = document.getElementById('searchInput').value.toLowerCase();
            const cards = document.getElementsByClassName('pengurus-card');
            for (let i = 0; i < cards.length; i++) {
                const name = cards[i].getAttribute('data-name');
                cards[i].style.display = name.includes(input) ? "" : "none";
            }
        }

        function toggleAccordion(index) {
            const content = document.getElementById(`content-${index}`);
            const arrow = document.getElementById(`arrow-${index}`);
            if(!content) return;
            
            if(content.classList.contains('hidden')) {
                content.classList.remove('hidden');
                arrow.style.transform = 'rotate(180deg)';
                arrow.style.color = '#38bdf8';
            } else {
                content.classList.add('hidden');
                arrow.style.transform = 'rotate(0deg)';
                arrow.style.color = '#525252';
            }
        }

        function bukaModalInputKas(btn) {
            const id = btn.getAttribute('data-id');
            const name = btn.getAttribute('data-name');
            const fullData = JSON.parse(btn.getAttribute('data-tracking'));

            document.getElementById('modalUserId').value = id;
            document.getElementById('modalTargetName').innerText = name;

            if (!localTrackingCache[id]) {
                localTrackingCache[id] = fullData;
            }
            const currentData = localTrackingCache[id];

            const grid = document.getElementById('modalMonthsGrid');
            grid.innerHTML = '';
            const months = ['Jan', 'Feb', 'Mar', 'Apr', 'Mei', 'Jun', 'Jul', 'Ags', 'Sep', 'Okt', 'Nov', 'Des'];
            
            let blockCount = 0;
            months.forEach(m => {
                if (!currentData[m]) {
                    blockCount++;
                    grid.innerHTML += `
                        <label class="border border-neutral-800 bg-neutral-950 rounded-md p-1.5 flex items-center justify-center gap-1 cursor-pointer hover:border-cyan-500/50">
                            <input type="checkbox" name="bulan[]" value="${m}" class="accent-cyan-400 admin-month-cb" onclick="hitungKalkulasiAdmin()"> ${m}
                        </label>
                    `;
                }
            });

            if(blockCount === 0) {
                grid.innerHTML = `<span class="col-span-4 text-[9px] text-emerald-400 text-center font-mono py-1">✓ LUNAS 12 BULAN!</span>`;
            }

            document.getElementById('modalTotalText').innerText = 'Rp 0';
            document.getElementById('modalInputKasAdmin').classList.remove('hidden');
        }

        function hitungKalkulasiAdmin() {
            const checkedCount = document.querySelectorAll('.admin-month-cb:checked').length;
            const total = checkedCount * 10000;
            document.getElementById('modalTotalText').innerText = 'Rp ' + total.toLocaleString('id-ID');
        }

        function tutupModalInputKas() {
            document.getElementById('modalInputKasAdmin').classList.add('hidden');
            resetModalImage();
        }

        function simpanKasRealTime(e) {
            e.preventDefault();
            
            const userId = document.getElementById('modalUserId').value;
            const checkboxSelected = document.querySelectorAll('.admin-month-cb:checked');

            if (checkboxSelected.length === 0) {
                Swal.fire({ icon: 'warning', title: 'Pilih Bulan!', text: 'Centang minimal 1 bulan angsuran kas, bro.' });
                return;
            }

            let bulanArray = [];
            checkboxSelected.forEach(cb => bulanArray.push(cb.value));
            const totalNominal = bulanArray.length * 10000;
            const metode = document.getElementById('modalMetode').value;

            const payload = {
                action: "insert_transaction",
                tanggal: new Date().toISOString().substring(0, 10),
                keterangan: `Pembayaran Uang Kas (${bulanArray.join(', ')})`,
                user_id: userId,
                nominal: totalNominal,
                metode: metode,
                kategori: "Kas Bulanan",
                status_reimburse: "Tidak Perlu", // Langsung terverifikasi (lunas) karena diinput admin
                bukti: kasImageBase64
            };

            tutupModalInputKas();
            
            Swal.fire({
                title: 'Menyimpan Uang Kas...',
                text: 'Sedang menulis transaksi ke database Google Sheets.',
                allowOutsideClick: false,
                didOpen: () => {
                    Swal.showLoading();
                }
            });

            fetch(GOOGLE_SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(payload)
            })
            .then(() => {
                // Tunggu 3 detik agar Google Sheets sempat memproses data sebelum refresh
                setTimeout(() => {
                    Swal.close();
                    Swal.fire({
                        icon: 'success',
                        title: 'Setoran Berhasil!',
                        text: 'Data kas berhasil disimpan. Memuat ulang data...',
                        showConfirmButton: false,
                        timer: 1800
                    }).then(() => {
                        fetchInitialData(true); // Refresh UI setelah delay
                    });
                }, 3000);
            })
            .catch(err => {
                Swal.close();
                console.error("Error:", err);
                Swal.fire({ icon: 'error', title: 'Gagal Menyimpan!', text: 'Terjadi kesalahan koneksi ke Google Sheets. Coba lagi.' });
            });
        }

        function hapusKasRealTime(btn) {
            const txId = btn.getAttribute('data-txid');
            const userId = btn.getAttribute('data-userid');
            const bulan = btn.getAttribute('data-bulan');
            const namaUser = btn.getAttribute('data-name');

            Swal.fire({
                title: 'Konfirmasi Hapus',
                text: `Hapus status lunas bulan ${bulan} untuk ${namaUser}? Tindakan ini akan menghapus transaksi terkait di database.`,
                icon: 'warning',
                showCancelButton: true,
                confirmButtonText: 'Ya, Hapus!',
                cancelButtonText: 'Batal',
                reverseButtons: true
            }).then((result) => {
                if (result.isConfirmed) {
                    Swal.fire({
                        title: 'Membatalkan Uang Kas...',
                        text: 'Sedang menghapus data di database.',
                        allowOutsideClick: false,
                        didOpen: () => {
                            Swal.showLoading();
                        }
                    });

                    const payload = {
                        action: "delete_transaction",
                        id: txId
                    };

                    fetch(GOOGLE_SCRIPT_URL, {
                        method: 'POST',
                        mode: 'no-cors',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(payload)
                    })
                    .then(() => {
                        setTimeout(() => {
                            Swal.close();
                            Swal.fire({
                                icon: 'success',
                                title: 'Dihapus!',
                                text: `Status lunas bulan ${bulan} resmi dibatalkan.`,
                                showConfirmButton: false,
                                timer: 1200
                            }).then(() => {
                                fetchInitialData(true); // Refresh UI setelah delay
                            });
                        }, 3000);
                    })
                    .catch(err => {
                        Swal.close();
                        console.error("Error:", err);
                        Swal.fire({ icon: 'error', title: 'Gagal Menghapus!', text: 'Koneksi database gagal.' });
                    });
                }
            });
        }

        // --- Theme System Scripts ---
        function applyTheme(theme) {
            const btn = document.getElementById('themeToggleBtn');
            const isLight = (theme === 'light');
            if (isLight) {
                document.documentElement.classList.add('light-mode');
                document.body.classList.add('light-mode');
                if (btn) btn.innerText = '☀️';
            } else {
                document.documentElement.classList.remove('light-mode');
                document.body.classList.remove('light-mode');
                if (btn) btn.innerText = '🌙';
            }
        }

        function toggleTheme(e) {
            const event = e || window.event;
            const currentTheme = localStorage.getItem('theme') || 'dark';
            const newTheme = currentTheme === 'light' ? 'dark' : 'light';
            localStorage.setItem('theme', newTheme);
            triggerThemeAnimation(newTheme, event);
        }

        function triggerThemeAnimation(newTheme, event) {
            const ripple = document.createElement('div');
            ripple.style.position = 'fixed';
            ripple.style.zIndex = '9998';
            ripple.style.borderRadius = '50%';
            ripple.style.pointerEvents = 'none';
            ripple.style.transition = 'transform 0.8s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.4s ease-out';
            ripple.style.backgroundColor = newTheme === 'light' ? '#f0f5f2' : '#07090e';
            
            let posX = window.innerWidth / 2;
            let posY = window.innerHeight / 2;
            
            if (event && event.clientX) {
                posX = event.clientX;
                posY = event.clientY;
            } else {
                const btn = document.getElementById('themeToggleBtn');
                if (btn) {
                    const rect = btn.getBoundingClientRect();
                    posX = rect.left + rect.width / 2;
                    posY = rect.top + rect.height / 2;
                }
            }
            
            ripple.style.width = '10px';
            ripple.style.height = '10px';
            ripple.style.left = `${posX - 5}px`;
            ripple.style.top = `${posY - 5}px`;
            ripple.style.transform = 'scale(0)';
            ripple.style.opacity = '1';
            
            const overlay = document.createElement('div');
            overlay.style.position = 'fixed';
            overlay.style.inset = '0';
            overlay.style.zIndex = '9999';
            overlay.style.display = 'flex';
            overlay.style.alignItems = 'center';
            overlay.style.justifyContent = 'center';
            overlay.style.pointerEvents = 'none';
            overlay.style.transition = 'opacity 0.4s ease-out';
            overlay.style.opacity = '0';
            
            const icon = document.createElement('div');
            icon.style.fontSize = '6rem';
            icon.style.transition = 'transform 0.45s cubic-bezier(0.34, 1.56, 0.64, 1)';
            icon.style.transform = 'scale(0) rotate(-45deg)';
            icon.style.filter = newTheme === 'light' ? 'drop-shadow(0 0 20px rgba(21, 128, 61, 0.4))' : 'drop-shadow(0 0 20px rgba(16, 185, 129, 0.4))';
            icon.innerText = newTheme === 'light' ? '☀️' : '🌙';
            
            overlay.appendChild(icon);
            document.body.appendChild(ripple);
            document.body.appendChild(overlay);
            
            ripple.offsetWidth;
            overlay.offsetWidth;
            
            const limit = Math.max(
                Math.hypot(posX, posY),
                Math.hypot(window.innerWidth - posX, posY),
                Math.hypot(posX, window.innerHeight - posY),
                Math.hypot(window.innerWidth - posX, window.innerHeight - posY)
            );
            const scaleFactor = (limit * 2) / 10;
            
            ripple.style.transform = `scale(${scaleFactor})`;
            overlay.style.opacity = '1';
            icon.style.transform = 'scale(1.5) rotate(0deg)';
            
            setTimeout(() => {
                applyTheme(newTheme);
            }, 380);
            
            setTimeout(() => {
                ripple.style.opacity = '0';
                overlay.style.opacity = '0';
                icon.style.transform = 'scale(0.8) rotate(45deg)';
                setTimeout(() => {
                    ripple.remove();
                    overlay.remove();
                }, 400);
            }, 650);
        }

        document.addEventListener('DOMContentLoaded', () => {
            const savedTheme = localStorage.getItem('theme') || 'dark';
            applyTheme(savedTheme);
            fetchInitialData();
        });
    </script>
</body>
</html>
