<!DOCTYPE html>
<html lang="id">
<head>
    <script>
        if (localStorage.getItem('theme') === 'light') {
            document.documentElement.classList.add('light-mode');
        }
    </script>
    <link class="head-theme-sync" rel="icon" href="../bendahara.png" type="image/png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kelola Anggota Center</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            /* ==========================================================================
               DARK MODE (DEFAULT) SYSTEM - Modern Deep Slate & Obsidian
               ========================================================================== */
            --bg-main: #07090e;              /* Deep elegant obsidian background */
            --bg-card: #0e111a;              /* Crisp card background with high contrast */
            --border-card: #1d2235;          /* Sophisticated border */
            --border-muted: #141724;         /* Subtler border */
            
            --text-primary: #f8fafc;         /* Slate 50 */
            --text-sec-100: #f1f5f9;         /* Slate 100 */
            --text-sec-200: #e2e8f0;         /* Slate 200 */
            --text-sec-300: #cbd5e1;         /* Slate 300 */
            --text-sec-400: #94a3b8;         /* Slate 400 */
            --text-sec-500: #64748b;         /* Slate 500 */
            --text-sec-600: #475569;         /* Slate 600 */
            
            --bg-neutral-pill: #151a29;      /* Background for neutral pills */
            
            --bg-cyan-pill: rgba(6, 182, 212, 0.08);
            --border-cyan-pill: rgba(6, 182, 212, 0.20);
            --text-cyan-accent: #22d3ee;     /* Cyan 400 */
            
            --bg-green-pill: rgba(34, 197, 94, 0.08);
            --border-green-pill: rgba(34, 197, 94, 0.20);
            --text-green-accent: #4ade80;    /* Green 400 */
            
            --bg-amber-pill: rgba(245, 158, 11, 0.08);
            --border-amber-pill: rgba(245, 158, 11, 0.20);
            --text-amber-accent: #fbbf24;    /* Amber 400 */
            
            --text-rose-accent: #fb7185;     /* Rose 400 */
            
            --splash-bg: #07090e;
            --splash-text: #ffffff;
            --splash-glow: rgba(16, 185, 129, 0.08);
            
            --footer-bg: rgba(14, 17, 26, 0.4);
            --footer-border: #141724;
            
            --hover-cyan-border: rgba(6, 182, 212, 0.4);
            --hover-green-border: rgba(34, 197, 94, 0.4);
            --hover-amber-border: rgba(245, 158, 11, 0.4);
            --hover-neutral-border: #334155;

            /* Accent glow variables */
            --glow-cyan: 0 4px 20px rgba(6, 182, 212, 0.15);
            --glow-green: 0 4px 20px rgba(34, 197, 94, 0.15);
            --shadow-card: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
        }
        
        html.light-mode {
            /* ==========================================================================
               LIGHT MODE SYSTEM - Comfort Sage Green & Mint White (Low Glare)
               ========================================================================== */
            --bg-main: #f0f5f2;              /* Soft soothing sage green-white */
            --bg-card: #ffffff;              /* Crisp white cards for depth */
            --border-card: #ccd9d2;          /* Soft sage borders */
            --border-muted: #e2ece7;         /* Subtler mint/sage borders */
            
            --text-primary: #0a140f;         /* Midnight spruce pine green for maximum contrast */
            --text-sec-100: #0a140f;
            --text-sec-200: #12241b;
            --text-sec-300: #1c3327;
            --text-sec-400: #284233;         /* Sage secondary (darker for readability) */
            --text-sec-500: #3b5c49;         /* Sage muted (darker) */
            --text-sec-600: #547862;         /* Sage lightest (darker) */
            
            --bg-neutral-pill: #e2ece7;      /* Soft mint-sage pills */
            
            --bg-cyan-pill: rgba(8, 145, 178, 0.06);
            --border-cyan-pill: rgba(8, 145, 178, 0.18);
            --text-cyan-accent: #0891b2;     /* Softer cyan for readability */
            
            --bg-green-pill: rgba(21, 128, 61, 0.06);
            --border-green-pill: rgba(21, 128, 61, 0.18);
            --text-green-accent: #15803d;    /* Rich green */
            
            --bg-amber-pill: rgba(180, 83, 9, 0.06);
            --border-amber-pill: rgba(180, 83, 9, 0.18);
            --text-amber-accent: #b45309;    /* Gold/Amber */
            
            --text-rose-accent: #be123c;     /* Deep ruby */
            
            --splash-bg: #f0f5f2;
            --splash-text: #0a140f;
            --splash-glow: rgba(21, 128, 61, 0.05);
            
            --footer-bg: rgba(226, 236, 231, 0.4);
            --footer-border: #ccd9d2;
            
            --hover-cyan-border: rgba(8, 145, 178, 0.4);
            --hover-green-border: rgba(21, 128, 61, 0.4);
            --hover-amber-border: rgba(180, 83, 9, 0.4);
            --hover-neutral-border: #b0c3b7;

            /* Shadow & glow adjustments */
            --glow-cyan: 0 4px 15px rgba(8, 145, 178, 0.08);
            --glow-green: 0 4px 15px rgba(21, 128, 61, 0.08);
            --shadow-card: 0 10px 30px -10px rgba(13, 32, 21, 0.05);
        }

        /* Font weight overrides in Light Mode to ensure readability */
        html.light-mode, html.light-mode body {
            font-weight: 500 !important;
        }
        html.light-mode .font-light,
        html.light-mode .font-normal {
            font-weight: 500 !important;
        }
        html.light-mode .font-medium {
            font-weight: 600 !important;
        }
        html.light-mode .font-semibold {
            font-weight: 700 !important;
        }
        html.light-mode .font-bold {
            font-weight: 800 !important;
        }
        html.light-mode input::placeholder {
            color: var(--text-sec-500) !important;
            opacity: 1 !important;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--bg-main) !important; 
            color: var(--text-primary) !important; 
            transition: background-color 0.4s cubic-bezier(0.4, 0, 0.2, 1), color 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        
        .premium-card {
            background-color: var(--bg-card) !important;
            border-color: var(--border-card) !important;
            box-shadow: var(--shadow-card);
            transition: border-color 0.3s ease, box-shadow 0.3s ease, transform 0.2s ease;
        }
        
        /* Subtle glow animations */
        @keyframes pulse-ring {
            0% { transform: scale(0.95); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(0.95); opacity: 0.8; }
        }
        @keyframes float-masjid {
            0%, 100% { transform: translateY(2px); }
            50% { transform: translateY(-2px); }
        }
        @keyframes pulse-sun {
            0%, 100% { transform: translate(-15px, -22px) scale(0.9); opacity: 0.8; }
            50% { transform: translate(-15px, -22px) scale(1.1); opacity: 1; }
        }
        @keyframes drift-cloud-1 {
            0%, 100% { transform: translate(-20px, -12px); }
            50% { transform: translate(-16px, -12px); }
        }
        @keyframes drift-cloud-2 {
            0%, 100% { transform: translate(20px, -14px); }
            50% { transform: translate(24px, -14px); }
        }
        .animate-float-masjid { animation: float-masjid 3s ease-in-out infinite; }
        .animate-pulse-sun { animation: pulse-sun 4s ease-in-out infinite; }
        .animate-drift-cloud-1 { animation: drift-cloud-1 5s ease-in-out infinite; }
        .animate-drift-cloud-2 { animation: drift-cloud-2 6s ease-in-out infinite; }

        #loading-overlay {
            background-color: var(--splash-bg);
            color: var(--splash-text);
        }
        .spinner-ring {
            border-color: rgba(6, 182, 212, 0.1);
            border-top-color: var(--text-cyan-accent);
        }

        /* SwAlert overrides to match our design system */
        .swal2-popup {
            background: var(--bg-card) !important;
            border: 1px solid var(--border-card) !important;
            border-radius: 1.25rem !important;
            color: var(--text-primary) !important;
            font-family: 'Plus Jakarta Sans', sans-serif !important;
        }
        .swal2-title {
            color: var(--text-sec-100) !important;
            font-size: 1rem !important;
            font-weight: 700 !important;
        }
        .swal2-html-container {
            color: var(--text-sec-400) !important;
            font-size: 0.75rem !important;
        }
        .swal2-confirm {
            background-color: #06b6d4 !important; /* Cyan 500 */
            color: #07090e !important;
            font-family: monospace !important;
            font-weight: 700 !important;
            font-size: 10px !important;
            border-radius: 0.75rem !important;
            padding: 0.75rem 1.5rem !important;
        }
        .swal2-cancel {
            background-color: #1c2235 !important;
            color: var(--text-sec-300) !important;
            font-family: monospace !important;
            font-weight: 700 !important;
            font-size: 10px !important;
            border-radius: 0.75rem !important;
            padding: 0.75rem 1.5rem !important;
        }
    </style>
</head>
<body class="min-h-screen antialiased flex flex-col justify-between selection:bg-cyan-950 selection:text-cyan-400">

    <!-- PREMIUM LOADING OVERLAY -->
    <div id="loading-overlay" class="fixed inset-0 z-[9999] flex flex-col items-center justify-center transition-all duration-300">
        <div class="relative flex flex-col items-center justify-center">
            <!-- Spinner Ring Outer -->
            <div class="w-20 h-20 rounded-full border-4 spinner-ring animate-spin"></div>
            
            <!-- Floating Elements Inside -->
            <div class="absolute w-20 h-20 flex items-center justify-center overflow-hidden">
                <div class="absolute text-amber-400 text-xs animate-pulse-sun" style="transform: translate(-15px, -22px);">☀️</div>
                <div class="absolute text-neutral-400 text-[9px] animate-drift-cloud-1" style="transform: translate(-20px, -12px);">☁️</div>
                <div class="absolute text-neutral-500 text-[7px] animate-drift-cloud-2" style="transform: translate(20px, -14px);">☁️</div>
                <div class="absolute text-2xl animate-float-masjid" style="transform: translateY(2px);">🕌</div>
            </div>
            
            <span class="mt-4 text-[10px] font-mono tracking-widest text-neutral-400 uppercase font-black">MEMUAT DATABASE...</span>
        </div>
    </div>

    <!-- HEADER -->
    <header class="border-b border-neutral-900 bg-neutral-950/40 backdrop-blur-md sticky top-0 z-50 h-14 flex items-center justify-center">
        <div class="max-w-4xl w-full mx-auto px-4 sm:px-6 flex items-center justify-between">
            <a href="Admin-Dashboard.html" class="flex items-center gap-1.5 px-3 py-1.5 rounded-xl bg-neutral-900 border border-neutral-800 hover:border-neutral-700 text-[10px] font-mono text-neutral-400 hover:text-cyan-400 transition-all duration-300 active:scale-95 font-bold shadow-inner font-bold">
                <span>←</span> <span>Dashboard</span>
            </a>
            <div class="flex items-center gap-3">
                <span class="text-xs font-mono tracking-wider text-cyan-400 uppercase font-bold hidden sm:inline">
                    KELOLA ANGGOTA KABINET
                </span>
                <button id="themeToggleBtn" onclick="toggleTheme(event)" class="w-9 h-9 rounded-full bg-neutral-950 border border-neutral-800 flex items-center justify-center text-sm shadow-inner hover:border-neutral-700 active:scale-95 transition-all text-neutral-300 cursor-pointer" title="Ubah Tema">
                    🌙
                </button>
            </div>
        </div>
    </header>

    <!-- MAIN CONTAINER -->
    <main class="max-w-4xl mx-auto px-4 sm:px-6 py-5 w-full flex-grow flex flex-col gap-4">
        
        <!-- PANEL FORM ANGGOTA BARU -->
        <div class="bg-neutral-950 border border-neutral-900 p-4 rounded-xl flex flex-col gap-3.5 shadow-xs">
            <div>
                <span class="text-[9px] font-mono tracking-widest text-cyan-400 uppercase font-black block">Database Pengurus</span>
                <h2 class="text-sm font-bold text-neutral-200 font-sans mt-0.5">Tambah Anggota Kabinet</h2>
            </div>

            <form id="formTambahAnggotaAjax" onsubmit="tambahAnggotaRealTime(event)" class="flex flex-col gap-3">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                    <div>
                        <label class="text-[9px] font-mono uppercase text-neutral-500 block mb-1 font-bold">NIM Pengurus</label>
                        <input type="text" id="inp_nim" required placeholder="Masukkan NIM (contoh: 2490343013)" class="w-full bg-neutral-900 border border-neutral-800 rounded-xl px-3 py-2.5 text-xs text-neutral-200 focus:outline-none focus:border-cyan-500 font-mono">
                    </div>
                    <div>
                        <label class="text-[9px] font-mono uppercase text-neutral-500 block mb-1 font-bold">Nama Lengkap</label>
                        <input type="text" id="inp_nama" required placeholder="Masukkan nama lengkap pengurus" class="w-full bg-neutral-900 border border-neutral-800 rounded-xl px-3 py-2.5 text-xs text-neutral-200 focus:outline-none focus:border-cyan-500 font-sans">
                    </div>
                </div>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                    <div>
                        <label class="text-[9px] font-mono uppercase text-neutral-500 block mb-1 font-bold">Divisi / Biro</label>
                        <select id="inp_divisi" required class="w-full bg-neutral-900 border border-neutral-800 rounded-xl px-3 py-2.5 text-xs text-neutral-200 focus:outline-none focus:border-cyan-500 font-sans cursor-pointer">
                            <option value="">Pilih Divisi...</option>
                            <option value="Departemen Kaderisasi">Departemen Kaderisasi</option>
                            <option value="Departemen Sosial Masyarakat">Departemen Sosial Masyarakat</option>
                            <option value="Departemen Syi'ar Islam">Departemen Syi'ar Islam</option>
                            <option value="Departemen HuMed">Departemen HuMed</option>
                            <option value="Divisi UUS">Divisi UUS</option>
                            <option value="Biro Kesekretariatan">Biro Kesekretariatan</option>
                            <option value="Biro Bendahara">Biro Bendahara</option>
                            <option value="Pimpinan Utama">Pimpinan Utama</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-[9px] font-mono uppercase text-neutral-500 block mb-1 font-bold">Jabatan</label>
                        <select id="inp_jabatan" required class="w-full bg-neutral-900 border border-neutral-800 rounded-xl px-3 py-2.5 text-xs text-neutral-200 focus:outline-none focus:border-cyan-500 font-sans cursor-pointer">
                            <option value="">Pilih Jabatan...</option>
                            <option value="Ketua Umum">Ketua Umum</option>
                            <option value="Sekretaris Umum">Sekretaris Umum</option>
                            <option value="Bendahara Umum">Bendahara Umum</option>
                            <option value="Ketua Departemen">Ketua Departemen</option>
                            <option value="Kepala Divisi">Kepala Divisi</option>
                            <option value="Kepala Biro">Kepala Biro</option>
                            <option value="Staff Ahli">Staff Ahli</option>
                            <option value="Staff Muda">Staff Muda</option>
                            <option value="Anggota">Anggota</option>
                        </select>
                    </div>
                </div>

                <button type="submit" class="w-full bg-cyan-600 hover:bg-cyan-700 text-neutral-950 font-mono text-xs py-3 rounded-xl font-black tracking-wider transition-all active:scale-95 cursor-pointer mt-1">
                    TAMBAH ANGGOTA BARU ✓
                </button>
            </form>
        </div>

        <!-- SEARCH BAR -->
        <div class="bg-neutral-950 border border-neutral-900 px-4 py-3 rounded-xl flex items-center gap-3">
            <span class="text-xs">🔍</span>
            <input type="text" id="searchInput" onkeyup="filterAnggota()" placeholder="Cari nama atau NIM anggota..." class="w-full bg-transparent text-xs text-neutral-200 focus:outline-none placeholder:text-neutral-600 font-sans">
        </div>

        <!-- LIST CONTAINER -->
        <div class="flex flex-col gap-2.5">
            <div class="flex items-center justify-between px-1">
                <span class="text-[9px] font-mono tracking-widest text-neutral-500 uppercase font-black">DAFTAR KEPENGURUSAN</span>
                <span id="memberCountBadge" class="text-[8px] font-mono bg-neutral-900 border border-neutral-800 text-cyan-400 px-2 py-0.5 rounded-md font-bold">0 Anggota</span>
            </div>

            <div id="anggotaListContainer" class="flex flex-col gap-2.5">
                <!-- Memuat secara dinamis -->
                <div class="py-12 text-center text-xs text-neutral-500 font-mono">Memuat data dari database...</div>
            </div>
        </div>

    </main>

    <!-- FOOTER -->
    <footer class="border-t border-neutral-900 bg-neutral-950/40 py-4 text-center mt-8">
        <span class="text-[9px] font-mono text-neutral-600 tracking-wider uppercase font-bold">LDK IMIP ADMIN © 2026</span>
    </footer>

    <!-- LOGIC SCRIPTS -->
    <script>
        // SCRIPT URL backend
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzc4KjFANk2dGnw18Vw07aXlJ8BLJ1-VrAPQ2Oj35v0LnmLennIA19Z5eJIyLl4N1ad/exec";

        let localAnggota = [];

        window.addEventListener('DOMContentLoaded', () => {
            // Load theme icon
            const currentTheme = localStorage.getItem('theme') || 'dark';
            document.getElementById('themeToggleBtn').innerText = currentTheme === 'light' ? '☀️' : '🌙';
            
            fetchInitialData();
        });

        // Fetch data awal
        function fetchInitialData(silent = false) {
            if (!silent) showLoadingOverlay();

            const cacheKey = "bendahara_all_data_cache";
            const cachedData = localStorage.getItem(cacheKey);
            let hasRenderedFromCache = false;

            if (cachedData) {
                try {
                    const parsed = JSON.parse(cachedData);
                    localAnggota = parsed.anggota || [];
                    renderAnggotaList();
                    hasRenderedFromCache = true;
                } catch(e) {
                    console.error("Gagal membaca cache lokal", e);
                }
            }

            if (!GOOGLE_SCRIPT_URL) {
                // Fallback dummy jika URL kosong
                if (!hasRenderedFromCache) {
                    localAnggota = [
                        { id: "M001", nim: "2490343013", name: "Muhammad Haris", divisi: "Departemen HuMed", jabatan: "Anggota", is_active: true },
                        { id: "M002", nim: "2490444040", name: "Hafiz Alfariz", divisi: "Pimpinan Utama", jabatan: "Ketua Umum", is_active: true }
                    ];
                    renderAnggotaList();
                }
                hideLoadingOverlay();
                return;
            }

            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 12000);

            fetch(GOOGLE_SCRIPT_URL + "?action=get_all_data", { signal: controller.signal })
                .then(res => res.json())
                .then(res => {
                    if (res.status === "success") {
                        localAnggota = res.anggota || [];
                        localStorage.setItem(cacheKey, JSON.stringify(res));
                        renderAnggotaList();
                    }
                })
                .catch(err => {
                    console.error("Fetch Error:", err);
                    if (!hasRenderedFromCache) {
                        document.getElementById('anggotaListContainer').innerHTML = `
                            <div class="py-12 text-center text-xs text-red-500 font-mono border border-red-950/20 rounded-xl bg-red-950/5">
                                Koneksi gagal / database offline!
                            </div>`;
                    }
                })
                .finally(() => {
                    clearTimeout(timeoutId);
                    hideLoadingOverlay();
                });
        }

        // Render Anggota ke HTML
        function renderAnggotaList() {
            const container = document.getElementById('anggotaListContainer');
            if (!container) return;

            container.innerHTML = '';
            document.getElementById('memberCountBadge').innerText = `${localAnggota.length} Anggota`;

            if (localAnggota.length === 0) {
                container.innerHTML = `<div class="py-12 text-center text-xs text-neutral-500 font-mono border border-neutral-900 rounded-xl bg-neutral-950/20">Belum ada data anggota.</div>`;
                return;
            }

            localAnggota.forEach(m => {
                const badgeActive = m.is_active !== false 
                    ? `<span class="px-2 py-0.5 rounded-md text-[8px] font-bold font-sans bg-emerald-950/50 border border-emerald-900/60 text-emerald-400 uppercase tracking-wider">Aktif</span>`
                    : `<span class="px-2 py-0.5 rounded-md text-[8px] font-bold font-sans bg-red-950/50 border border-red-900/60 text-rose-400 uppercase tracking-wider">Tidak Aktif</span>`;
                
                const cardHtml = `
                    <div class="anggota-card bg-neutral-950 border border-neutral-900 p-3.5 rounded-xl flex items-center justify-between gap-3 shadow-xs transition-all duration-300 hover:border-cyan-500/20" data-name="${String(m.name || '').toLowerCase()}" data-nim="${String(m.nim || '').toLowerCase()}">
                        <div class="overflow-hidden flex flex-col gap-0.5">
                            <div class="flex items-center gap-2 flex-wrap">
                                <h3 class="text-xs font-bold text-neutral-200 truncate font-sans">${m.name}</h3>
                                ${badgeActive}
                            </div>
                            <div class="flex flex-wrap items-center gap-x-2 text-[9px] font-mono text-neutral-500 mt-0.5">
                                <span class="text-neutral-400 font-semibold select-all">${m.nim}</span>
                                <span class="text-neutral-800">|</span>
                                <span class="text-neutral-400">${m.divisi} — ${m.jabatan}</span>
                            </div>
                        </div>
                        <button type="button" onclick="bukaModalEdit('${m.id}')" class="bg-neutral-900 hover:bg-cyan-900/20 border border-neutral-800 text-cyan-400 text-[10px] font-bold px-3 py-1.5 rounded-lg font-mono transition-transform active:scale-95 cursor-pointer">
                            EDIT
                        </button>
                    </div>
                `;
                container.innerHTML += cardHtml;
            });
        }

        // Filter Anggota berdasarkan input
        function filterAnggota() {
            const query = document.getElementById('searchInput').value.toLowerCase().trim();
            const cards = document.getElementsByClassName('anggota-card');
            for (let i = 0; i < cards.length; i++) {
                const name = cards[i].getAttribute('data-name') || '';
                const nim = cards[i].getAttribute('data-nim') || '';
                if (name.includes(query) || nim.includes(query)) {
                    cards[i].style.display = '';
                } else {
                    cards[i].style.display = 'none';
                }
            }
        }

        // Tambah Anggota Real-Time
        function tambahAnggotaRealTime(e) {
            e.preventDefault();
            const nim = document.getElementById('inp_nim').value.trim();
            const nama = document.getElementById('inp_nama').value.trim();
            const divisi = document.getElementById('inp_divisi').value;
            const jabatan = document.getElementById('inp_jabatan').value;

            if (!nim || !nama || !divisi || !jabatan) {
                Swal.fire({ icon: 'warning', title: 'Perhatian', text: 'Mohon isi semua field!' });
                return;
            }

            if (!GOOGLE_SCRIPT_URL) {
                const randomId = "MEM-" + Date.now();
                localAnggota.unshift({
                    id: randomId,
                    nim: nim,
                    name: nama,
                    divisi: divisi,
                    jabatan: jabatan,
                    is_active: true
                });
                Swal.fire({ icon: 'success', title: 'Berhasil!', text: 'Anggota tersimpan secara lokal.', showConfirmButton: false, timer: 1000 });
                document.getElementById('formTambahAnggotaAjax').reset();
                renderAnggotaList();
                return;
            }

            Swal.fire({
                title: 'Mendaftarkan Anggota...',
                text: 'Menulis data pengurus baru ke Google Sheets.',
                allowOutsideClick: false,
                didOpen: () => { Swal.showLoading(); }
            });

            fetch(GOOGLE_SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    action: "insert_member",
                    nim: nim,
                    nama: nama,
                    divisi: divisi,
                    jabatan: jabatan
                })
            })
            .then(() => {
                Swal.close();
                Swal.fire({ icon: 'success', title: 'Anggota Berhasil Ditambahkan!', showConfirmButton: false, timer: 1200 });
                document.getElementById('formTambahAnggotaAjax').reset();
                fetchInitialData(true);
            })
            .catch(err => {
                Swal.close();
                console.error(err);
                Swal.fire({ icon: 'error', title: 'Gagal Menambahkan!', text: err.toString() });
            });
        }

        // Buka Modal Edit Anggota
        function bukaModalEdit(id) {
            const member = localAnggota.find(m => m.id.toString() === id.toString());
            if (!member) return;

            const divisis = [
                'Departemen Kaderisasi',
                'Departemen Sosial Masyarakat',
                'Departemen Syi\'ar Islam',
                'Departemen HuMed',
                'Divisi UUS',
                'Biro Kesekretariatan',
                'Biro Bendahara',
                'Pimpinan Utama'
            ];

            const jabatans = [
                'Ketua Umum',
                'Sekretaris Umum',
                'Bendahara Umum',
                'Ketua Departemen',
                'Kepala Divisi',
                'Kepala Biro',
                'Staff Ahli',
                'Staff Muda',
                'Anggota'
            ];

            let divisiOptions = '';
            divisis.forEach(d => {
                const selected = member.divisi === d ? 'selected' : '';
                divisiOptions += `<option value="${d}" ${selected}>${d}</option>`;
            });

            let jabatanOptions = '';
            jabatans.forEach(j => {
                const selected = member.jabatan === j ? 'selected' : '';
                jabatanOptions += `<option value="${j}" ${selected}>${j}</option>`;
            });

            const isActiveChecked = member.is_active !== false ? 'checked' : '';

            Swal.fire({
                title: 'EDIT DETAIL ANGGOTA',
                html: `
                    <div class="text-left flex flex-col gap-3 font-sans mt-3">
                        <div>
                            <label class="text-[8px] font-mono text-neutral-500 uppercase font-black block mb-1">NIM Pengurus</label>
                            <input type="text" id="edit_nim" value="${member.nim}" class="w-full bg-neutral-950 border border-neutral-800 rounded-xl px-3 py-2 text-xs text-neutral-200 focus:outline-none focus:border-cyan-500 font-mono">
                        </div>
                        <div>
                            <label class="text-[8px] font-mono text-neutral-500 uppercase font-black block mb-1">Nama Lengkap</label>
                            <input type="text" id="edit_nama" value="${member.name}" class="w-full bg-neutral-950 border border-neutral-800 rounded-xl px-3 py-2 text-xs text-neutral-200 focus:outline-none focus:border-cyan-500 font-sans">
                        </div>
                        <div>
                            <label class="text-[8px] font-mono text-neutral-500 uppercase font-black block mb-1">Divisi / Biro</label>
                            <select id="edit_divisi" class="w-full bg-neutral-950 border border-neutral-800 rounded-xl px-3 py-2 text-xs text-neutral-200 focus:outline-none focus:border-cyan-500 font-sans">
                                ${divisiOptions}
                            </select>
                        </div>
                        <div>
                            <label class="text-[8px] font-mono text-neutral-500 uppercase font-black block mb-1">Jabatan</label>
                            <select id="edit_jabatan" class="w-full bg-neutral-950 border border-neutral-800 rounded-xl px-3 py-2 text-xs text-neutral-200 focus:outline-none focus:border-cyan-500 font-sans">
                                ${jabatanOptions}
                            </select>
                        </div>
                        <div class="flex items-center gap-2 py-1 mt-1 border-t border-neutral-900/60 pt-3">
                            <input type="checkbox" id="edit_is_active" ${isActiveChecked} class="w-4 h-4 rounded border-neutral-800 bg-neutral-950 text-cyan-500 focus:ring-cyan-500 cursor-pointer">
                            <label for="edit_is_active" class="text-xs font-bold text-neutral-200 cursor-pointer select-none">Status Anggota Aktif</label>
                        </div>
                    </div>
                `,
                showCancelButton: true,
                confirmButtonText: 'SIMPAN PERUBAHAN ✓',
                cancelButtonText: 'BATAL ✕',
                focusConfirm: false,
                preConfirm: () => {
                    return {
                        nim: document.getElementById('edit_nim').value.trim(),
                        nama: document.getElementById('edit_nama').value.trim(),
                        divisi: document.getElementById('edit_divisi').value,
                        jabatan: document.getElementById('edit_jabatan').value,
                        is_active: document.getElementById('edit_is_active').checked
                    }
                }
            }).then((result) => {
                if (result.isConfirmed) {
                    const data = result.value;
                    simpanPerubahanAnggota(id, data);
                }
            });
        }

        // Simpan Perubahan Anggota
        function simpanPerubahanAnggota(id, data) {
            if (!GOOGLE_SCRIPT_URL) {
                const idx = localAnggota.findIndex(m => m.id.toString() === id.toString());
                if (idx !== -1) {
                    localAnggota[idx].nim = data.nim;
                    localAnggota[idx].name = data.nama;
                    localAnggota[idx].divisi = data.divisi;
                    localAnggota[idx].jabatan = data.jabatan;
                    localAnggota[idx].is_active = data.is_active;
                }
                Swal.fire({ icon: 'success', title: 'Berhasil!', text: 'Perubahan disimpan secara lokal.', showConfirmButton: false, timer: 1000 });
                renderAnggotaList();
                return;
            }

            Swal.fire({
                title: 'Menyimpan Perubahan...',
                text: 'Mengirimkan pembaruan data ke Google Sheets.',
                allowOutsideClick: false,
                didOpen: () => { Swal.showLoading(); }
            });

            fetch(GOOGLE_SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    action: "edit_member",
                    id: id,
                    nim: data.nim,
                    nama: data.nama,
                    divisi: data.divisi,
                    jabatan: data.jabatan,
                    is_active: data.is_active
                })
            })
            .then(() => {
                Swal.close();
                Swal.fire({ icon: 'success', title: 'Pembaruan Berhasil!', showConfirmButton: false, timer: 1200 });
                fetchInitialData(true);
            })
            .catch(err => {
                Swal.close();
                console.error(err);
                Swal.fire({ icon: 'error', title: 'Gagal Menyimpan!', text: err.toString() });
            });
        }

        // Overlay Utilities
        function showLoadingOverlay() {
            const overlay = document.getElementById('loading-overlay');
            if (overlay) {
                overlay.style.opacity = '1';
                overlay.style.pointerEvents = 'auto';
            }
        }
        function hideLoadingOverlay() {
            const overlay = document.getElementById('loading-overlay');
            if (overlay) {
                overlay.style.opacity = '0';
                overlay.style.pointerEvents = 'none';
            }
        }

        // Premium Theme Switcher
        function toggleTheme(e) {
            const event = e || window.event;
            const currentTheme = localStorage.getItem('theme') || 'dark';
            const newTheme = currentTheme === 'light' ? 'dark' : 'light';
            localStorage.setItem('theme', newTheme);
            triggerThemeAnimation(newTheme, event);
        }

        function triggerThemeAnimation(newTheme, event) {
            const ripple = document.createElement('div');
            ripple.style.position = 'fixed';
            ripple.style.zIndex = '9998';
            ripple.style.borderRadius = '50%';
            ripple.style.pointerEvents = 'none';
            ripple.style.transition = 'transform 0.8s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.4s ease-out';
            ripple.style.backgroundColor = newTheme === 'light' ? '#f0f5f2' : '#07090e';
            
            let posX = window.innerWidth / 2;
            let posY = window.innerHeight / 2;
            
            if (event && event.clientX) {
                posX = event.clientX;
                posY = event.clientY;
            } else {
                const btn = document.getElementById('themeToggleBtn');
                if (btn) {
                    const rect = btn.getBoundingClientRect();
                    posX = rect.left + rect.width / 2;
                    posY = rect.top + rect.height / 2;
                }
            }
            
            const radius = Math.max(
                Math.hypot(posX, posY),
                Math.hypot(window.innerWidth - posX, posY),
                Math.hypot(window.innerWidth - posX, window.innerHeight - posY),
                Math.hypot(posX, window.innerHeight - posY)
            );
            
            ripple.style.width = '2px';
            ripple.style.height = '2px';
            ripple.style.left = `${posX - 1}px`;
            ripple.style.top = `${posY - 1}px`;
            ripple.style.transform = 'scale(0)';
            
            document.body.appendChild(ripple);
            
            ripple.offsetHeight; // Force reflow
            
            ripple.style.transform = `scale(${radius})`;
            
            setTimeout(() => {
                if (newTheme === 'light') {
                    document.documentElement.classList.add('light-mode');
                    document.getElementById('themeToggleBtn').innerText = '☀️';
                } else {
                    document.documentElement.classList.remove('light-mode');
                    document.getElementById('themeToggleBtn').innerText = '🌙';
                }
                
                ripple.style.opacity = '0';
                setTimeout(() => {
                    ripple.remove();
                }, 400);
            }, 350);
        }
    </script>
</body>
